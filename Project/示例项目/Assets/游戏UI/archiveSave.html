<rml>
<head>
    <link type="text/template" href="../window.lua" />
    <link type="text/css" href="archive.css"/>
    <script>
            HTMLArchiveSave = HTMLArchiveSave or {}

            -- 当页面被加载
            function HTMLArchiveSave.OnLoad(element,document)
                local save_box = element:GetElementById('save-box')
                for i = 1, 60 do
                    local number = string.format("%02d", i)

                    -- 存档槽
                    local save_slot = document:CreateElement('button')
                    save_slot = save_box:AppendChild(save_slot)
                    save_slot:SetAttribute('class', 'save-slot')

                    local onClickScript = string.format("HTMLArchiveSave.SaveCurrentGame(element, '%s')", number)
                    save_slot:SetAttribute('onclick', onClickScript)

                    -- 存档数字
                    local save_number = document:CreateElement('div')
                    save_number = save_slot:AppendChild(save_number)
                    save_number:SetAttribute('class', 'save-number')
                    save_number:SetAttribute('id', 'save-number-'..number..'')
                    save_number.innerRml = number

                    -- 存档日期时间
                    local save_time = document:CreateElement('div')
                    save_time = save_slot:AppendChild(save_time)
                    save_time:SetAttribute('class', 'save-time')
                    save_time:SetAttribute('id', 'save-time-'..number..'')

                    -- 存档描述
                    local save_description = document:CreateElement('div')
                    save_description = save_slot:AppendChild(save_description)
                    save_description:SetAttribute('class', 'save-description')
                    save_description:SetAttribute('id', 'save-description-'..number..'')

                    -- 读取存档如果存在
                    local archive = GalGame.GetEngine().ArchiveSystem:GetArchiveByNumber(number)
                    if archive.isValid then
                        save_time.innerRml = archive.dateTime
                        save_description.innerRml = archive.description
                    end
                end
            end

            -- 当存档槽被点击
            function HTMLArchiveSave.SaveCurrentGame(element, number)
                --print(number)
                local archive = GalGame.GetEngine().ArchiveSystem:SaveArchiveByNumber(number)
                if archive.isValid then
                    element:GetElementById('save-time-'..number..'').innerRml = archive.dateTime
                    element:GetElementById('save-description-'..number..'').innerRml = archive.description
                    --print(element:GetElementById('save-time-'..number..'').innerRml)
                end
            end
    </script>

</head>
<!-- -->
<body onload="HTMLArchiveSave.OnLoad(element,document)" onkeydown="if Window.EscapePressed(event) then Window.LoadMenu('/assets/game/game',document) end">
    <div class="save-container">
        <div class="save-box" id="save-box">
            <!-- 存档格子 1 
            <div onclick="HTMLArchiveRead.SaveCurrentGame(element)" class="save-slot">
                <div class="save-number" id="save-number">01</div>
                <img class="save-screenshot" id="save-screenshot" />

                <div class="save-description" id="save-description"></div>
                <div class="new-tag">NEW!</div>
            </div>-->
        </div>
    </div>
</body>
</rml>
