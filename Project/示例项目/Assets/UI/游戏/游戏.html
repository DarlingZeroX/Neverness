<rml>
    <head>
        <link type="text/template" href="../window.lua" />
        <link type="text/css" href="游戏CSS.css"/>

        <script>
            HTML游戏对话框 = HTML游戏对话框 or {}

            -- 当对话框被点击
            function HTML游戏对话框.对话框点击()
                if(GalEngine.GetEngine().DialogueSystem.isTypingText)
                then
                    GalEngine.GetEngine().DialogueSystem:FinishTyping()
                else
                    GalEngine.GetEngine().DialogueSystem:ContinueDialogue()
                end
            end
            
            -- 页面加载时调用
            function HTML游戏对话框.页面加载调用()
                html当前游戏UI状态 = "游戏中"
                HTML游戏对话框.autoDialogueChecked = false
                HTML游戏对话框.fastForwardChecked = false
            end

            -- 加载游戏设置界面
            function HTML游戏对话框.加载游戏设置界面(event, document)
                event:StopPropagation()
                Window.LoadMenu('/assets/menu/options_menu',document)
            end

            -- 自动对话
            function HTML游戏对话框.自动对话(event, element, document)
                event:StopPropagation()
                HTML游戏对话框.autoDialogueChecked = not GalEngine.GetEngine().DialogueSystem.autoDialogue
                if HTML游戏对话框.autoDialogueChecked then
                    element:SetAttribute('class', 'choice-btn-checked')
                else
                    element:SetAttribute('class', 'choice-btn')
                end
                GalEngine.GetEngine().DialogueSystem.autoDialogue = HTMLGame.autoDialogueChecked
            end

            -- 快进按钮点击事件
            function HTML游戏对话框.快进(event, element, document)
                event:StopPropagation()
                HTMLGame.fastForwardChecked = not GalGame.GetEngine().DialogueSystem.fastForward
                if HTMLGame.fastForwardChecked then
                    element:SetAttribute('class', 'choice-btn-checked')
                else
                    element:SetAttribute('class', 'choice-btn')
                end
                GalEngine.GetEngine().DialogueSystem.fastForward = HTMLGame.fastForwardChecked
            end

            -- 加载存档保存界面
            function HTML游戏对话框.加载存档保存界面(event, document)
                event:StopPropagation()
                Window.LoadMenu('/assets/game/archiveSave',document)
            end

            -- 加载读取存档界面
            function HTML游戏对话框.加载存档读取界面(event, document)
                event:StopPropagation()
                Window.LoadMenu('/assets/game/archiveRead',document)
            end

            -- 加载记录界面
            function HTML游戏对话框.加载记录界面(event, document)
                event:StopPropagation()
                Window.LoadMenu('/assets/game/record',document)
            end

            -- 当按下ESC键时调用
            function HTML游戏对话框.当ESC按下(event,document)
                --[[
                if Window.EscapePressed(event) then 
                    if document.visibility then
                        document.visibility = true
                    else
                        document.visibility = false
                    end
                end
                 --]]
            end
        </script>
    </head>
    <body onkeydown="HTML游戏对话框.当ESC按下(event,document)" onload="HTML游戏对话框.页面加载调用()">  
        
        <div class="game-container">
            <div class="dialog-box" onclick="HTML游戏对话框.对话框点击()" data-model="dialog">
                <div class="name-tag" id="name-tag">{{dialog_name}}</div>
                <div class="dialog-text" id="dialog-text">{{dialog_text}}</div>
                <div class="choices" id="choices">
                    <button class="choice-btn" id="btn1" onclick="HTML游戏对话框.加载存档保存界面(event,document)">保存</button>
                    <button class="choice-btn" id="btn2" onclick="HTML游戏对话框.加载存档读取界面(event,document)">读取</button>
                    <button class="choice-btn" id="btn3" onclick="HTML游戏对话框.加载游戏设置界面(event,document)">设置</button>
                    <button class="choice-btn" id="btn4" onclick="HTML游戏对话框.自动对话(event,element,document)">自动</button>
                    <button class="choice-btn" id="btn5" onclick="HTML游戏对话框.快进(event,element,document)">快进</button>
                    <button class="choice-btn" id="btn6" onclick="HTML游戏对话框.加载记录界面(event,document)">记录</button>
                </div>

            </div>
        </div>
            
    </body>
    </rml>
