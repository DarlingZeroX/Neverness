<rml>

<head>
    <link type="text/template" href="../窗口.lua" />
    <link type="text/css" href="对话记录CSS.css"/>
    <script>
        HTML游戏对话记录 = HTML游戏对话记录 or {}

        function HTML游戏对话记录.页面加载调用(element,document)
            对话记录盒子 = element:GetElementById('dialogue-box')

            local 索引 = 0
            local 对话数量 = GalGame.获取引擎().对话系统.对话数目
            while 索引 < 对话数量 do
                -- 对话项
                对话项 = document:CreateElement('div')
                对话项 = 对话记录盒子:AppendChild(对话项)
                对话项:SetAttribute('class', 'dialogue-item')
                -- 角色名
                对话角色 = document:CreateElement('div')
                对话角色 = 对话项:AppendChild(对话角色)
                对话角色:SetAttribute('class', 'character-name')
                对话角色.innerRml = GalGame.获取引擎().对话系统:获取对话人物(索引)
                -- 对话内容
                对话文本 = document:CreateElement('div')
                对话文本 = 对话项:AppendChild(对话文本)
                对话文本:SetAttribute('class', 'dialogue-text')
                对话文本.innerRml = GalGame.获取引擎().对话系统:获取对话文本(索引)

                索引 = 索引 + 1
            end
        end

        function HTML游戏对话记录.检查ESC按下(event,document)
            if HTML窗口.ESC按下(event) then 
                HTML窗口.加载文档('/assets/UI/游戏/游戏',document) 
            end
        end
    </script>
</head>
<!-- -->
<body onload="HTML游戏对话记录.页面加载调用(element,document)" onkeydown="HTML游戏对话记录.检查ESC按下(event,document)">
    <div class="dialogue-container">
        <!-- 背景图，可替换成实际游戏背景 
        <div class="background"></div>-->
        <div class="dialogue-box" id="dialogue-box">
            <!--<div class="dialogue-item">
                <div class="character-name">穹</div>
                <div class="dialogue-text">……悠……怎么了？</div>
            </div>
            -->
        </div>
    </div>
</body>

</rml>
