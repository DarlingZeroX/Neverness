<rml>
    <head>
        <link type="text/template" href="../窗口.lua" />
        <link type="text/css" href="游戏CSS.css"/>
        <link type="text/template" href="../UI状态.lua" />

        <script>
            HTML游戏状态 = HTML游戏状态 or { 当前场景 = "游戏中" }
            HTML游戏对话框 = HTML游戏对话框 or {}

            -- 当对话框被点击
            function HTML游戏对话框.对话框点击(event, element, document)
                if(GalGame.获取引擎().对话系统.是否正在打印对话)
                then
                    GalGame.获取引擎().对话系统:完成打印对话()
                else
                    GalGame.获取引擎().对话系统:继续对话()
                end
            end
            
            -- 页面更新回调
            function HTML游戏对话框.页面更新回调()
                if HTML_UI状态.对话框状态改变 then
                    print('HTML_UI状态.对话框透明度: ', HTML_UI状态.对话框透明度)
                    HTML_UI状态.对话框页面Element:GetElementById('dialog-box').style.decorator = 'vertical-gradient( rgba(65, 88, 87, ' .. HTML_UI状态.对话框透明度 .. ') rgba(89, 144, 163, ' .. HTML_UI状态.对话框透明度 .. ') )'
                    HTML_UI状态.对话框状态改变 = false
                end
                
                HTML_UI状态.对话框页面Element:GetElementById('name-tag').innerRml = GalGame.获取引擎().对话系统.当前对话人物
                --HTML_UI状态.对话框页面Element:GetElementById('dialog-text').innerRml = GalGame.获取引擎().对话系统.当前对话文本
            end

            function HTML游戏对话框.打印回调(打印文本, 是否正在打印)
                local dialogTextElement = HTML_UI状态.对话框页面Element:GetElementById('dialog-text')

                if 是否正在打印 == false then
                    dialogTextElement.innerRml = 打印文本
                    return;
                end

                local spanElement = HTML_UI状态.对话框页面Document:CreateElement('span')
                spanElement = dialogTextElement:AppendChild(spanElement)
                spanElement:SetAttribute('class', 'font-container-style')
                spanElement.innerRml = 打印文本
            end

            -- 页面加载时调用
            function HTML游戏对话框.页面加载调用(event, element, document)
                HTML游戏状态.当前场景 = "游戏中"
                HTML游戏对话框.自动对话标记 = false
                HTML游戏对话框.快进对话标记 = false

                HTML_UI状态.对话框页面Element = element
                HTML_UI状态.对话框页面Document = document

                GalGame.获取引擎().对话系统:清除全部打印回调()
                GalGame.获取引擎().对话系统:添加打印回调(HTML游戏对话框.打印回调)
                document:AddUpdateCallback(HTML游戏对话框.页面更新回调)
                --element:GetElementById('dialog-box').style.decorator = 'vertical-gradient( rgba(65, 88, 87, 200) rgba(89, 144, 163, 200) )'
            end

            -- 页面卸载时调用
            function HTML游戏对话框.页面卸载调用(event, element, document)
				print('页面卸载调用')
                GalGame.获取引擎().对话系统:清除全部打印回调()
            end

            -- 自动对话
            function HTML游戏对话框.自动对话(event, element, document)
                event:StopPropagation()
                HTML游戏对话框.自动对话标记 = not GalGame.获取引擎().对话系统.自动对话
                if HTML游戏对话框.自动对话标记 then
                    element:SetAttribute('class', 'choice-btn-checked')
                else
                    element:SetAttribute('class', 'choice-btn')
                end
                GalGame.获取引擎().对话系统.自动对话 = HTML游戏对话框.自动对话标记
            end

            -- 快进按钮点击事件
            function HTML游戏对话框.快进对话(event, element, document)
                event:StopPropagation()
                HTML游戏对话框.快进对话标记 = not GalGame.获取引擎().对话系统.快进
                if HTML游戏对话框.快进对话标记 then
                    element:SetAttribute('class', 'choice-btn-checked')
                else
                    element:SetAttribute('class', 'choice-btn')
                end
                GalGame.获取引擎().对话系统.快进 = HTML游戏对话框.快进对话标记
            end

            -- 加载游戏设置界面
            function HTML游戏对话框.加载游戏设置界面(event, document)
                event:StopPropagation()
                HTML窗口.打开文档('/assets/UI/主菜单/游戏设置',document)
            end

            -- 加载存档保存界面
            function HTML游戏对话框.加载存档保存界面(event, document)
                event:StopPropagation()
                GalGame.获取引擎():场景截图()
                HTML窗口.加载文档('/assets/UI/游戏/存档保存',document)
            end

            -- 加载读取存档界面
            function HTML游戏对话框.加载存档读取界面(event, document)
                event:StopPropagation()
                HTML窗口.加载文档('/assets/UI/游戏/存档读取',document)
            end

            -- 加载记录界面
            function HTML游戏对话框.加载记录界面(event, document)
                event:StopPropagation()
                HTML窗口.加载文档('/assets/UI/游戏/对话记录',document)
            end

            -- 当按下ESC键时调用
            function HTML游戏对话框.当ESC按下(event,document)
                --[[
                if Window.EscapePressed(event) then 
                    if document.visibility then
                        document.visibility = true
                    else
                        document.visibility = false
                    end
                end
                 --]]
            end
        </script>
    </head>
    <body onkeydown="HTML游戏对话框.当ESC按下(event,document)" onload="HTML游戏对话框.页面加载调用(event, element, document)" onunload=" GalGame.获取引擎().对话系统:清除全部打印回调()">  
        
        <div class="game-container">
            <div class="dialog-box" id="dialog-box" onclick="HTML游戏对话框.对话框点击(event, element, document)">
                <div class="name-tag" id="name-tag"></div>
                <div class="dialog-text" id="dialog-text"></div>
                <div class="choices" id="choices">
                    <button class="choice-btn" id="btn1" onclick="HTML游戏对话框.加载存档保存界面(event,document)">保存</button>
                    <button class="choice-btn" id="btn2" onclick="HTML游戏对话框.加载存档读取界面(event,document)">读取</button>
                    <button class="choice-btn" id="btn3" onclick="HTML游戏对话框.加载游戏设置界面(event,document)">设置</button>
                    <button class="choice-btn" id="btn4" onclick="HTML游戏对话框.自动对话(event,element,document)">自动</button>
                    <button class="choice-btn" id="btn5" onclick="HTML游戏对话框.快进对话(event,element,document)">快进</button>
                    <button class="choice-btn" id="btn6" onclick="HTML游戏对话框.加载记录界面(event,document)">记录</button>
                </div>

            </div>
        </div>
            
    </body>
    </rml>
