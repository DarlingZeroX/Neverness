<rml>
<head>
    <link type="text/template" href="../窗口.lua" />
    <link type="text/css" href="存档CSS.css"/>
    <script>
            HTML存档读取 = HTML存档读取 or {}

            -- 当页面被加载
            function HTML存档读取.加载时调用(element,document)
                local 存档项 = element:GetElementById('save-box')
                for i = 1, 60 do
                    local 索引 = string.format("%02d", i)

                    -- 存档槽
                    local 存档槽 = document:CreateElement('button')
                    存档槽 = 存档项:AppendChild(存档槽)
                    存档槽:SetAttribute('class', 'save-slot-disable')

                    -- 存档数字
                    local 存档数字 = document:CreateElement('div')
                    存档数字 = 存档槽:AppendChild(存档数字)
                    存档数字:SetAttribute('class', 'save-number')
                    存档数字.innerRml = 索引

                    -- 存档日期时间
                    local 存档日期时间 = document:CreateElement('div')
                    存档日期时间 = 存档槽:AppendChild(存档日期时间)
                    存档日期时间:SetAttribute('class', 'save-time')

                    -- 存档描述
                    local 存档描述 = document:CreateElement('div')
                    存档描述 = 存档槽:AppendChild(存档描述)
                    存档描述:SetAttribute('class', 'save-description')

                    -- 读取存档如果存在
                    local 存档 = GalGame.获取引擎().存档系统:获取存档(索引)
                    if 存档.isValid then
                        存档槽:SetAttribute('class', 'save-slot')
                        存档日期时间.innerRml = 存档.dateTime
                        存档描述.innerRml = 存档.description
                        local onClickScript = string.format("HTML存档读取.加载存档(element, document, '%s')", 索引)
                        存档槽:SetAttribute('onclick', onClickScript)
                    end
                end
            end

            -- 当存档槽被点击
            function HTML存档读取.加载存档(element,document, index)
                --print(index)
                local 存档 = GalGame.获取引擎().存档系统:获取存档(index)
                if 存档.isValid then  
                    转场管理器:开始转场命令('Screen','fadeOut 1.0')
                    转场管理器:开始转场命令('Screen','fadeIn 1.0')

                    if(html当前游戏UI状态 == "主菜单") then
                        场景管理器:加载场景('/assets/游戏场景.vgasset')
                    elseif(html当前游戏UI状态 == "游戏中") then
                        HTML窗口.加载文档('/assets/UI/游戏/游戏',document)
                    end
                    GalGame.获取引擎():加载存档(存档)   
                    --print("dddddddddddddddddd")
                end
            end

            -- 当Esc按下
            function HTML存档读取.当ESC按下(element,document, event)
                if HTML窗口.ESC按下(event) then 
                    if(HTML游戏状态.当前场景 == '主菜单') then
                        HTML窗口.加载文档('/assets/UI/主菜单/主菜单',document)
                    elseif(HTML游戏状态.当前场景 == "游戏中") then
                        HTML窗口.加载文档('/assets/UI/游戏/游戏',document)
                    end         
                end
            end
    </script>

</head>
<!-- 存档读取窗口 -->
<body onload="HTML存档读取.加载时调用(element,document)" onkeydown="HTML存档读取.当ESC按下(element,document, event)">
    <div class="save-container">
        <div class="save-box" id="save-box">
            <!-- 存档格子 1 
            <div onclick="HTML存档读取.SaveCurrentGame(element,'01')" class="save-slot">
                <div class="save-number" id="save-number">01</div>
                <img class="save-screenshot" id="save-screenshot" />
                <div class="save-time" id="save-time"></div>
                <div class="save-description" id="save-description"></div>
                <div class="new-tag">NEW!</div>
            </div>-->

        </div>
    </div>
</body>
</rml>
