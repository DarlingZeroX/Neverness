<rml>
<head>
    <link type="text/template" href="../窗口.lua" />
    <link type="text/css" href="存档CSS.css"/>
    <script>
            HTML存档保存 = HTML存档保存 or {}

            -- 当页面被加载
            function HTML存档保存.页面加载时调用(element,document)
                -- 释放纹理缓存，以加载新的存档截图
                rmlui:ReleaseTextures()

                local 存档项 = element:GetElementById('save-box')
                for i = 1, 60 do
                    local 索引 = string.format("%02d", i)

                    -- 存档槽
                    local 存档槽 = document:CreateElement('button')
                    存档槽 = 存档项:AppendChild(存档槽)
                    存档槽:SetAttribute('class', 'save-slot')

                    local onClickScript = string.format("HTML存档保存.保存当前游戏(element, '%s')", 索引)
                    存档槽:SetAttribute('onclick', onClickScript)

                    -- 存档数字
                    local 存档数字 = document:CreateElement('div')
                    存档数字 = 存档槽:AppendChild(存档数字)
                    存档数字:SetAttribute('class', 'save-number')
                    存档数字:SetAttribute('id', 'save-number-'..索引..'')
                    存档数字.innerRml = 索引

                    -- 存档日期时间
                    local 存档日期时间 = document:CreateElement('div')
                    存档日期时间 = 存档槽:AppendChild(存档日期时间)
                    存档日期时间:SetAttribute('class', 'save-time')
                    存档日期时间:SetAttribute('id', 'save-time-'..索引..'')

                    -- 存档描述
                    local 存档描述 = document:CreateElement('div')
                    存档描述 = 存档槽:AppendChild(存档描述)
                    存档描述:SetAttribute('class', 'save-description')
                    存档描述:SetAttribute('id', 'save-description-'..索引..'')

                    -- 存档截图
                    local 存档截图 = document:CreateElement('img')
                    存档截图 = 存档槽:AppendChild(存档截图)
                    存档截图:SetAttribute('class', 'save-screenshot')
                    存档截图:SetAttribute('id', 'save-screenshot-'..索引..'')
                    
                    -- 读取存档如果存在
                    local 存档 = GalGame.获取引擎().存档系统:获取存档(索引)
                    if 存档.isValid then
                        存档日期时间.innerRml = 存档.dateTime
                        存档描述.innerRml = 存档.description
                        存档截图:SetAttribute('src', string.format('[system]%s',存档.screenshotPath))
                    end
                end
            end

            -- 当存档槽被点击
            function HTML存档保存.保存当前游戏(element, index)
                local 存档 = GalGame.获取引擎().存档系统:保存存档(index)
                if 存档.isValid then
                    -- 释放纹理缓存，以加载新的存档截图
                    rmlui:ReleaseTextures()

                    element:GetElementById('save-time-'..index..'').innerRml = 存档.dateTime
                    element:GetElementById('save-description-'..index..'').innerRml = 存档.description
                    element:GetElementById('save-screenshot-'..index..''):SetAttribute('src', string.format('[system]%s',存档.screenshotPath))
                end
            end

            -- 当Esc按下
            function HTML存档保存.当ESC按下(element,document, event)
                if HTML窗口.ESC按下(event) then 
                    if(HTML游戏状态.当前场景 == '主菜单') then
                        HTML窗口.加载文档('/assets/UI/主菜单/主菜单',document)
                    elseif(HTML游戏状态.当前场景 == "游戏中") then
                        HTML窗口.加载文档('/assets/UI/游戏/游戏',document)
                    end         
                end
            end
    </script>

</head>
<!-- -->
<body onload="HTML存档保存.页面加载时调用(element,document)" onkeydown="HTML存档保存.当ESC按下(element,document, event)">
    <div class="save-container">
        <div class="save-box" id="save-box">
            <!-- 存档格子 1 
            <div onclick="HTMLArchiveRead.SaveCurrentGame(element)" class="save-slot">
                <div class="save-number" id="save-number">01</div>
                <img class="save-screenshot" id="save-screenshot" />
                <div class="save-time" id="save-time"></div>
                <div class="save-description" id="save-description"></div>
                <div class="new-tag">NEW!</div>
            </div>-->
        </div>
    </div>
</body>
</rml>
