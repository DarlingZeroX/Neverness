<rml>

<head>
    <link type="text/template" href="../window.lua" />
    <link type="text/css" href="record.css"/>
    <script>
        function OnGalgameRecordLoad(element,document)
            dialogue_box = element:GetElementById('dialogue-box')

            local count = 0
            while count < GalGame.GetEngine().DialogueSystem.dialogNumber do
                -- 对话项
                dialogue_item = document:CreateElement('div')
                dialogue_item = dialogue_box:AppendChild(dialogue_item)
                dialogue_item:SetAttribute('class', 'dialogue-item')
                -- 角色名
                character_name = document:CreateElement('div')
                character_name = dialogue_item:AppendChild(character_name)
                character_name:SetAttribute('class', 'character-name')
                character_name.innerRml = GalGame.GetEngine().DialogueSystem:GetDialogCharacter(count)
                -- 对话内容
                dialogue_text = document:CreateElement('div')
                dialogue_text = dialogue_item:AppendChild(dialogue_text)
                dialogue_text:SetAttribute('class', 'dialogue-text')
                dialogue_text.innerRml = GalGame.GetEngine().DialogueSystem:GetDialogText(count)

                count = count + 1
            end
        end
    </script>
</head>
<!-- -->
<body onload="OnGalgameRecordLoad(element,document)" onkeydown="if Window.EscapePressed(event) then Window.LoadMenu('/assets/game/game',document) end">
    <div class="dialogue-container">
        <!-- 背景图，可替换成实际游戏背景 
        <div class="background"></div>-->
        <div class="dialogue-box" id="dialogue-box">
            <!--<div class="dialogue-item">
                <div class="character-name">穹</div>
                <div class="dialogue-text">……悠……怎么了？</div>
            </div>
            -->
        </div>
    </div>
</body>

</rml>
