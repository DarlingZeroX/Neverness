<rml>
<head>
    <style>
        body {
            font-family: "Microsoft YaHei";
        }

        @keyframes container-animation {
            from { 
                transform: scale(1.05);
                opacity: 0;
                visibility: hidden;
            }
            to { 
                transform: scale(1.0);
                opacity: 1;
                visibility: visible;
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw; 
            padding: 20px;
            box-sizing: border-box;

            animation: 0.2s container-animation;
        }

        /*需要定义 overflow 范围条的css，其他的css样式才不会显示出错*/
        scrollbarvertical
        {
            width: 27px;
        }

        .menu {
            display: flex;
            flex-direction: column;

            width: 100%;
            max-width: 360px;
            max-height: 60vh;
            overflow-y: auto;
            background-color: rgba(40, 151, 255,150);

            border-radius: 5px;
        }

        .input-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .input-box {
            width: 100%;
            height: 30px;

            border-width: 1px;
            border-color: rgba(0, 0, 0, 255);

            background-color: rgba(255, 255, 255, 200);
            font-size: 16px;
            color: rgba(0, 0, 0, 255);
            text-align: center;
        }
 
        .input-button {
            /*background-color: rgba(27, 89, 104, 125);*/
            background-color: rgba(78, 239, 239, 100);
            margin: 10px 0;
            padding: 15px 20px;
            border-width: 1px ;
            border-color: rgba(255, 255, 255, 50);
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s ;
            backdrop-filter: blur(5px);

            font-effect: outline(2px rgb(49, 49, 49));
        }

        .input-button:hover {
            background-color: rgba(78, 239, 239, 80);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 15px rgba(138, 43, 226, 200);
        }
    </style>

    <script>
        HTML获取输入 = HTML获取输入 or {}
        
        function HTML获取输入.确定(element,document)
            local 输入内容 = element:GetElementById("input-box"):AsFormControlInput().value
            print(输入内容)
            GalGame.获取引擎().UI系统:确定当前输入(输入内容)
            document:Close()
        end

        -- 当页面被加载
        function HTML获取输入.加载时调用(element,document)
            local 输入标题 = GalGame.获取引擎().UI系统:获取当前玩家输入标题()
            element:GetElementById("input-title").innerRml = 输入标题
            local 按键文本 = GalGame.获取引擎().UI系统:获取当前玩家输入按键文本()
            element:GetElementById("input-button").innerRml = 按键文本
        end
    </script>
</head>
<body onload="HTML获取输入.加载时调用(element,document)">
        
    <!-- 主容器 -->
    <div class="container">  
        <!-- 菜单 -->
        <div class="menu" id ="menu-box">
            <span class="input-title" id="input-title">标题：获取输入</span>
            <input type="text" class="input-box" id="input-box" placeholder="请输入内容"/>
            <button class="input-button" id="input-button" onclick="HTML获取输入.确定(element, document)">确定</button>
        </div>
    </div>
		
</body>

</rml>
