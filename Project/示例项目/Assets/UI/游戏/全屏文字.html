<rml>
<head>
    <style>
       body {
            font-family: "Microsoft YaHei";
        }

        @keyframes container-animation {
            from { 
                transform: scale(1.05);
                opacity: 0;
                visibility: hidden;
            }
            to { 
                transform: scale(1.0);
                opacity: 1;
                visibility: visible;
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw; 
            padding: 10px;
            box-sizing: border-box;
            background-color: black;

            animation: 0.2s container-animation;
        }

        /*需要定义 overflow 范围条的css，其他的css样式才不会显示出错*/
        scrollbarvertical
        {
            width: 27px;
        }

        .menu {
            display: flex;
            flex-direction: column;

            height: 80%;
            width: 90%; 

            overflow-y: auto;
            /*** background-color: rgb(184, 112, 19); ***/
        }

        @keyframes font-animation {
            from { 
                opacity: 0;
            }
            to { 
                opacity: 1;
            }
        }

        .menu-item {
            /*** background-color: rgba(27, 89, 104, 125); ***/

            margin: 2px 0;
            padding: 10px 20px;
            border-width: 0px ;

            text-align: left;
            font-size: 26px;
            cursor: pointer;
            transition: transform 0.3s ;
            backdrop-filter: blur(5px);

            white-space: pre-line;  /*** 实现文字换行***/
            word-break: break-all;

            animation: 1.5s font-animation;
            font-effect: outline(1px rgb(49, 49, 49));
        }

    </style>

    <script>
        HTML全屏文字 = HTML全屏文字 or {}
        HTML全屏文字.当前文字索引 = 0

        function HTML全屏文字.定时器回调()
            HTML全屏文字.当前文字索引 = HTML全屏文字.当前文字索引 + 1
            if HTML全屏文字.当前文字索引 < GalGame.获取引擎().UI系统:获取当前全屏文本项数量() then
                local 文本框 = HTML全屏文字.全屏文字Elem:GetElementById('menu-box')
                local 文本 = GalGame.获取引擎().UI系统:获取当前全屏文本项(HTML全屏文字.当前文字索引)
                local 文本项 = HTML全屏文字.全屏文字文档:CreateElement('span')
                文本项:SetAttribute('class', 'menu-item')
                文本项.innerRml = '<span>' .. 文本 .. '</span>'
                --文本项:SetAttribute('onclick', 'HTML全屏文字.选择当前全屏文本项(document, 0)')
                文本框:AppendChild(文本项)

                HTML全屏文字.全屏文字文档:AddTimerCallback(2.0, HTML全屏文字.定时器回调)
            else 
                HTML全屏文字.当前文字索引 = 0
                HTML全屏文字.全屏文字文档:Close()
            end
        end

        -- 当页面被加载
        function HTML全屏文字.加载时调用(element,document)
            HTML全屏文字.全屏文字文档 = document
            HTML全屏文字.全屏文字Elem = element
            local 文字数量 = GalGame.获取引擎().UI系统:获取当前全屏文本项数量()
            
            local 文本框 = element:GetElementById('menu-box')
            local 文本 = GalGame.获取引擎().UI系统:获取当前全屏文本项(0)
            local 文本项 = document:CreateElement('span')
            文本项:SetAttribute('class', 'menu-item')
            文本项.innerRml = '<span>' .. 文本 .. '</span>'
            --文本项:SetAttribute('onclick', 'HTML全屏文字.选择当前全屏文本项(document, 0)')
            文本框:AppendChild(文本项)

            document:AddTimerCallback(2.0, HTML全屏文字.定时器回调)
        end
    </script>
</head>
<body onload="HTML全屏文字.加载时调用(element,document)">

    <!-- 主容器 -->
    <div class="container">  
        <!-- 菜单 -->
        <div class="menu" id ="menu-box">
            <!--
            <span class="menu-item" onclick="HTML主菜单.开始游戏(event,documnet)">
                开始游戏11111111111111111111111111111111111111111111111111
            </span>    
            -->   
        </div>
    </div>
		
</body>

</rml>
