<rml>
<head>
    <style>
        body {
            font-family: "Microsoft YaHei";
        }

        @keyframes container-animation {
            from { 
                transform: scale(1.05);
                opacity: 0;
                visibility: hidden;
            }
            to { 
                transform: scale(1.0);
                opacity: 1;
                visibility: visible;
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw; 
            padding: 20px;
            box-sizing: border-box;

            animation: 0.2s container-animation;
        }

        /*需要定义 overflow 范围条的css，其他的css样式才不会显示出错*/
        scrollbarvertical
        {
            width: 27px;
        }

        .menu {
            display: flex;
            flex-direction: column;

            width: 100%;
            max-width: 360px;
            max-height: 60vh;
            overflow-y: auto;
            /*background-color: rgb(184, 112, 19);*/
        }

        .menu-item {
            /*background-color: rgba(27, 89, 104, 125);*/
            background-color: rgba(78, 239, 239, 100);
            margin: 10px 0;
            padding: 15px 20px;
            border-width: 1px ;
            border-color: rgba(255, 255, 255, 50);
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s ;
            backdrop-filter: blur(5px);

            font-effect: outline(2px rgb(49, 49, 49));
        }

        .menu-item:hover {
            background-color: rgba(78, 239, 239, 80);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 15px rgba(138, 43, 226, 200);
        }
    </style>

    <script>
        HTML剧情选择 = HTML剧情选择 or {}
        
        function HTML剧情选择.选择当前剧情选项(document, i)
            GalGame.获取引擎().UI系统:选择当前剧情选项(i)
            document:Close()
        end

        -- 当页面被加载
        function HTML剧情选择.加载时调用(element,document)
            local 选项数量 = GalGame.获取引擎().UI系统:获取当前剧情选项数量()

            local 菜单框 = element:GetElementById('menu-box')
            for i = 0, 选项数量 - 1 do
                local 选项文本 = GalGame.获取引擎().UI系统:获取当前剧情选项文本(i)
                local 选项按钮 = document:CreateElement('button')
                选项按钮:SetAttribute('class', 'menu-item')
                选项按钮.innerRml = '<span>' .. 选项文本 .. '</span>'
                选项按钮:SetAttribute('onclick', 'HTML剧情选择.选择当前剧情选项(document, ' .. i .. ')')
                菜单框:AppendChild(选项按钮)
            end
        end
    </script>
</head>
<body onload="HTML剧情选择.加载时调用(element,document)">

    <!-- 主容器 -->
    <div class="container">  
        <!-- 菜单 -->
        <div class="menu" id ="menu-box">
            <!--
            <button class="menu-item" onclick="HTML主菜单.开始游戏(event,documnet)">
                <span>开始游戏</span>
            </button>
            <button class="menu-item" onclick="HTML窗口.加载文档('/assets/UI/游戏/存档读取',document)">
                <span>读取存档</span>
            </button>
            <button class="menu-item" onclick="HTML窗口.加载文档('/assets/UI/主菜单/游戏设置',document)">
                <span>游戏设置</span>
            </button>
            <button class="menu-item" onclick="HTML窗口.加载文档('/assets/UI/主菜单/关于游戏',document)">
                <span>关于游戏</span>
            </button>
            <button class="menu-item" onclick="Application.Quit()">
                <span>结束游戏</span>
            </button>
            -->
        </div>
    </div>
		
</body>

</rml>
