<rml>
    <head>
        <link type="text/template" href="../窗口.lua" />
        <link type="text/template" href="../UI状态.lua" />
        <link type="text/css" href="游戏设置CSS.css"/>

        <script>
            HTML选项菜单 = HTML选项菜单 or {}
            --HTML_UI状态 = nil
            
            function HTML选项菜单.返回主菜单(event,document)
                转场管理器:开始转场命令('Screen','fadeOut 1.0')
                转场管理器:开始转场命令('Screen','fadeIn 1.0')
                场景管理器:加载场景('/assets/主菜单场景.vgasset')
            end

            function HTML选项菜单.结束游戏(event,document)
                Application.Quit()
            end

            function HTML选项菜单.设置UI状态(element)
                element:GetElementById('dialogue-opacity'):SetAttribute('value', tostring(HTML_UI状态.对话框透明度))
                local bgm音量 = GalGame.获取引擎().场景系统:获取音频层('BGM').音量
                element:GetElementById('bgm-volume'):SetAttribute('value', tostring(bgm音量))
                local 文字显示速度 = GalGame.获取引擎().对话系统.文字显示速度
                element:GetElementById('text-speed'):SetAttribute('value', tostring(文字显示速度))
                local 快进间隔时间 = GalGame.获取引擎().对话系统.快进间隔时间
                element:GetElementById('textfast-interval'):SetAttribute('value', tostring(快进间隔时间))
            end

            function HTML选项菜单.OnLoad(element, document)
                HTML选项菜单.设置UI状态(element)

                if(HTML游戏状态.当前场景 == "游戏中") then
                    local 选项菜单底部按钮组 = element:GetElementById('option-menu-bottom-button')

                    local 返回主菜单按钮 = document:CreateElement('button')
                    返回主菜单按钮 = 选项菜单底部按钮组:AppendChild(返回主菜单按钮)
                    返回主菜单按钮:SetAttribute('class', 'back-btn')
                    返回主菜单按钮:SetAttribute('onclick', 'HTML选项菜单.返回主菜单(event,document)')
                    返回主菜单按钮.innerRml = '返回主菜单'

                    local 结束游戏按钮 = document:CreateElement('button')
                    结束游戏按钮 = 选项菜单底部按钮组:AppendChild(结束游戏按钮)
                    结束游戏按钮:SetAttribute('class', 'back-btn')
                    结束游戏按钮:SetAttribute('onclick', 'HTML选项菜单.结束游戏(event,document)')
                    结束游戏按钮.innerRml = '结束游戏'
                end
            end

            function HTML选项菜单.关闭选项菜单(event,document)
                print(HTML游戏状态.当前场景)
                if(HTML游戏状态.当前场景 == '主菜单') then
                    HTML窗口.加载文档('/assets/UI/主菜单/主菜单',document)
                elseif(HTML游戏状态.当前场景 == "游戏中") then
                    --HTML窗口.加载文档('/assets/UI/游戏/游戏',document)
                    document:Close()
                end    
            end

            HTML选项菜单按钮 = HTML选项菜单按钮 or {}
            function HTML选项菜单按钮.改变背景音乐音量(drag_element)
                local volume = drag_element:GetAttribute('value')
                GalGame.获取引擎().场景系统:获取音频层('BGM').音量 = tonumber(volume)   
            end

            function HTML选项菜单按钮.改变对话框透明度(drag_element)
                HTML_UI状态.对话框透明度 = drag_element:GetAttribute('value')
                HTML_UI状态.对话框状态改变 = true
            end

            function HTML选项菜单按钮.改变文字显示速度(drag_element)
                local 文字显示速度 = drag_element:GetAttribute('value')
                GalGame.获取引擎().对话系统.文字显示速度 = tonumber(文字显示速度)
            end

            function HTML选项菜单按钮.改变文字快进间隔时间(drag_element)
                local 文字快进间隔时间 = drag_element:GetAttribute('value')
                GalGame.获取引擎().对话系统.快进间隔时间 = tonumber(文字快进间隔时间)
            end
        </script>
    </head>
    <body onload="HTML选项菜单.OnLoad(element,document)" onkeydown="if HTML窗口.ESC按下(event) then HTML选项菜单.关闭选项菜单(event,document) end" class="fade-in">  
        <!-- 设置界面 -->
        <div class="settings-container"> 
            <div class="settings-panel">

                <!-- 菜单 -->
                <div class="settings-header">
                    <div class="settings-title">游戏设置</div>
                    <button class="close-btn" id="closeSettings">
                        <i class="fa fa-times"></i>
                    </button>
                </div>

                <div class="setting-group">

                    <div class="setting-header">   
                        <div class="setting-title">声音设置</div>
                    </div>

                    <div class="slider-setting">
                        <div class="slider-label">音乐</div>
                        <input id="bgm-volume" type="range" min="0" max="1" step="0.01" value="1" ondrag = "HTML选项菜单按钮.改变背景音乐音量(element)" /> 
                    </div>
            
                    <div class="slider-setting">
                        <div class="slider-label">效果音</div>
                        <input type="range" min="0" max="1" step="0.01" value="1"/> 
                    </div>
             
                    <div class="slider-setting">
                        <div class="slider-label">系统音</div>
                        <input type="range" min="0" max="1" step="0.01" value="1"/> 
                    </div>

                    <div class="slider-setting">
                        <div class="slider-label">语音</div>
                        <input type="range" min="0" max="1" step="0.01" value="1"/> 
                    </div>

                </div>


                <div class="setting-group">

                    <div class="slider-setting">
                        <div class="slider-label">对话框透明度</div>
                        <input id="dialogue-opacity" type="range" min="0" max="255" step="1" value="200" ondrag = "HTML选项菜单按钮.改变对话框透明度(element)"/> 
                    </div>
            
                    <div class="slider-setting">
                        <div class="slider-label">文字显示速度</div>
                        <input id="text-speed" type="range" min="0" max="0.1" step="0.001" value="0.02" ondrag = "HTML选项菜单按钮.改变文字显示速度(element)"/> 
                    </div>
             
                    <div class="slider-setting">
                        <div class="slider-label">文字快进</div>
                        <tabset id="textfast">
                            <tab>已读</tab>
                            <tab>全部</tab>
                        </tabset>
                    </div>

                </div>

                <div class="setting-group">
                    <div class="setting-header">   
                        <div class="setting-title">自动模式设定</div>
                    </div>
                    <div class="slider-setting">
                        <div class="slider-label">快进间隔时间</div>
                        <input id="textfast-interval" type="range" min="0" max="0.5" step="0.005" value="0" ondrag = "HTML选项菜单按钮.改变文字快进间隔时间(element)"/> 
                    </div>
                </div>
                <div class="option-menu-bottom-button" id="option-menu-bottom-button">
                    <button class="back-btn" onclick="HTML选项菜单.关闭选项菜单(event,document)">返回</button>
                </div>
            </div>

        </div>
            
    </body>
    
    </rml>
